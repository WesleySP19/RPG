<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire Vault - D&D 5e Manager</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="vault-app">
        <!-- Persistent Action Center (Sidebar Left) -->
        <aside id="action-center" class="sidebar side-left glass-panel">
            <header class="sidebar-header">
                <h3>Diário da Mesa</h3>
            </header>
            <div id="diary-logs" class="scroll-panel"></div>
            <div class="sidebar-footer">
                <input type="text" id="diary-input" class="grimoire-input" placeholder="[AÇÃO] + [INTENÇÃO]...">
                <button id="btn-add-note" class="grimoire-btn">Gritar</button>
            </div>
        </aside>

        <!-- Main Stage (Center) -->
        <main id="main-stage">
            <div id="view-port">
                <!-- VISTA: LOGIN -->
                <section id="view-login" class="view-container active">
                    <div class="login-box glass-panel">
                        <h1 class="ornament">Grimoire Vault</h1>
                        <p style="opacity:0.6; margin-bottom: 2rem;">Entre no Cofre Arcano para sua jornada...</p>
                        
                        <div class="input-group">
                            <label>Identificador de Alma</label>
                            <input type="password" id="identificador" class="grimoire-input" placeholder="Sua Mensagem Secreta...">
                        </div>
                        
                        <button id="btn-login" class="grimoire-btn" style="width:100%; margin-top:1rem;">Forjar Chave</button>
                        
                        <div id="key-display" style="display:none; margin-top:1.5rem; text-align:center;">
                            <div class="key-box" id="access-key-output">XXXX-XXXX-XXXX</div>
                            <button id="btn-copy-key" class="grimoire-btn-icon" style="margin-top:0.5rem;">📜 Copiar Chave</button>
                            <button id="btn-enter" class="grimoire-btn" style="width:100%; margin-top:1rem;">ENTRAR NO COFRE</button>
                        </div>
                    </div>
                </section>

                <!-- VISTA: DASHBOARD -->
                <section id="view-dashboard" class="view-container">
                    <!-- Dashboard content dynamically injected -->
                </section>

                <!-- VISTA: FICHA -->
                <section id="view-sheet" class="view-container">
                    <header class="view-header" style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="display:flex; gap:1rem; align-items:center;">
                            <button id="btn-back-dashboard" class="grimoire-btn-icon">🔙</button>
                            <h2>Pergaminho</h2>
                        </div>
                    </header>
                    <div id="sheet-content"></div>
                </section>

                <!-- VISTA: SESSÃO -->
                <section id="view-session" class="view-container">
                    <header class="view-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                        <div style="display:flex; gap:1rem; align-items:center;">
                            <button id="btn-leave-session" class="grimoire-btn-icon">🏃</button>
                            <h2 id="session-title">Aventura Ativa</h2>
                        </div>
                        <div class="header-actions" style="display:flex; gap:0.5rem;">
                            <button id="btn-open-map" class="grimoire-btn-icon" title="Mapa">🗺️</button>
                            <button id="btn-open-srd" class="grimoire-btn-icon" title="Compêndio">📚</button>
                        </div>
                    </header>
                    <div id="session-content"></div>
                </section>
            </div>
        </main>

        <!-- Persistent Códice (Sidebar Right) -->
        <aside id="codice-center" class="sidebar side-right glass-panel">
            <header class="sidebar-header">
                <h3>Códice do Aventureiro</h3>
            </header>
            <div id="codice-content" class="scroll-panel">
                <!-- Conduct Guidelines -->
            </div>
            <div class="sidebar-footer">
                <small> Grimório Conectado</small>
            </div>
        </aside>
    </div>

    <!-- MODAL -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content glass-panel">
            <button class="modal-close" onclick="document.getElementById('modal-overlay').style.display='none'">×</button>
            <div id="modal-inner"></div>
        </div>
    </div>

    <!-- Grimoire App Orchestration (ES Modules) -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
