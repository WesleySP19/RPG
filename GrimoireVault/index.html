<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire Vault - D&D 5e Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#5E1F2D">
</head>
<body>

    <main id="vault-app">
        <section id="view-login" class="view-container login-vault scroll-panel active">
            <h1>Grimoire Vault</h1>
            <div class="ornament-divider"></div>
            <p>Informe seu identificador para acessar o cofre.</p>
            
            <div style="margin: 2rem 0;">
                <input type="text" id="identificador" class="grimoire-input" placeholder="E-mail ou Celular">
            </div>
            
            <button id="btn-login" class="grimoire-btn">Desbloquear Grimório</button>
            
            <div id="key-display" style="display:none; margin-top: 2rem; border: 1px dashed var(--clr-wine); padding: 1rem;">
                <p style="font-size: 0.8rem;">Sua Chave Pessoal (Guarde-a!):</p>
                <code id="access-key-output" style="display:block; margin: 0.5rem 0; color: var(--clr-wine); font-weight: bold;"></code>
                <button id="btn-copy-key" class="grimoire-btn" style="font-size: 0.7rem; padding: 0.4rem;">Copiar Chave</button>
                <button id="btn-enter" class="grimoire-btn" style="display:block; width: 100%; margin-top: 1rem;">Entrar no Painel</button>
            </div>
        </section>

        <!-- Dashboard View -->
        <section id="view-dashboard" class="view-container scroll-panel">
            <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--clr-wine); padding-bottom: 1rem;">
                <h2>Painel do Aventureiro</h2>
                <button id="btn-logout" class="grimoire-btn" style="font-size: 0.7rem;">Fechar Grimório</button>
            </header>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem;">
                <aside>
                    <h3>Seus Personagens</h3>
                    <div id="character-list" style="margin-top: 1rem;">
                        <p style="opacity: 0.5;">Nenhuma ficha encontrada...</p>
                    </div>
                    <button id="btn-new-char" class="grimoire-btn" style="width: 100%; margin-top: 1rem;">Criar Novo Herói</button>
                </aside>

                <main>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h3>Suas Mesas</h3>
                        <button id="btn-sync-qr" class="grimoire-btn" style="font-size: 0.6rem; background: var(--clr-gold); color: black;">Sincronizar QR</button>
                    </div>
                    <div id="session-list" style="margin-top: 1rem;">
                        <p style="opacity: 0.5;">Nenhuma sessão ativa...</p>
                    </div>
                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <button id="btn-create-session" class="grimoire-btn" style="flex: 1;">Mestrar Mesa</button>
                        <button id="btn-join-session" class="grimoire-btn" style="flex: 1;">Entrar em Mesa</button>
                    </div>
                </main>
            </div>

                    <h3>🍻 Taverna do Grande Grimório</h3>
                    <button id="btn-open-homebrew" class="grimoire-btn" style="font-size: 0.6rem;">Oficina de Homebrew</button>
                </div>
                <div id="tavern-board" style="background: rgba(0,0,0,0.2); padding: 1rem; margin-top: 1rem; max-height: 200px; overflow-y: auto;">
                </div>
                <div style="display: flex; gap: 4px; margin-top: 0.5rem;">
                    <input type="text" id="tavern-input" class="grimoire-input" placeholder="Postar no mural da taverna..." style="font-size: 0.8rem;">
                    <button id="btn-add-tavern" class="grimoire-btn" style="padding: 4px 8px;">🤝</button>
                </div>
            </div>
        </section>

        <!-- Character Sheet View -->
        <section id="view-sheet" class="view-container scroll-panel">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Ficha de Personagem</h2>
                <button id="btn-voice-roll" class="grimoire-btn" style="font-size: 0.6rem; border-radius: 50%;">🎤</button>
            </div>
            <div id="sheet-content">
            </div>
            <button id="btn-back-dashboard" class="grimoire-btn" style="margin-top: 2rem;">Voltar ao Painel</button>
        </section>

            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <h2 id="session-title">Mesa de Jogo</h2>
                <button id="btn-open-srd" class="grimoire-btn" style="font-size: 0.6rem;">📜 Compêndio SRD</button>
                <button id="btn-open-map" class="grimoire-btn" style="font-size: 0.6rem;">🗺️ Mapa Tático</button>
            </div>
            
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; margin-top: 1rem; flex: 1;">
                <div id="session-content"></div>
                
                <div id="session-diary" style="border-left: 1px solid var(--clr-gold); padding-left: 1rem; display: flex; flex-direction: column;">
                    <h3>Diário de Sessão</h3>
                    <div id="diary-logs" style="flex: 1; overflow-y: auto; margin: 1rem 0;"></div>
                    <div style="display: flex; gap: 4px;">
                        <input type="text" id="diary-input" class="grimoire-input" placeholder="Nova nota..." style="font-size: 0.8rem;">
                        <button id="btn-add-note" class="grimoire-btn" style="padding: 4px 8px;">🖋️</button>
                    </div>
                </div>
            </div>

            <button id="btn-leave-session" class="grimoire-btn" style="margin-top: 2rem;">Sair da Mesa</button>
        </section>
    </main>

    <!-- Overlay / Modals -->
    <div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div id="modal-content" class="scroll-panel" style="max-width: 500px; width: 90%; text-align: center;">
            <div id="modal-inner"></div>
            <button class="grimoire-btn" style="margin-top: 1rem;" onclick="document.getElementById('modal-overlay').style.display='none'">Fechar</button>
        </div>
    </div>

    <!-- Hidden Video for Scanner -->
    <video id="qr-video" style="display:none;"></video>

    <!-- Project Logic -->
    <script src="./js/app.js" type="module"></script>
</body>
</html>
