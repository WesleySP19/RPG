<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Grimoire Vault - Test Suite</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #1a1a1a; color: #0f0; padding: 2rem; }
        .pass { color: #0f0; }
        .fail { color: #f00; font-weight: bold; }
        .test-case { margin-bottom: 0.5rem; padding: 0.5rem; border-bottom: 1px solid #333; }
        h1 { color: #B89B4B; border-bottom: 2px solid #5E1F2D; padding-bottom: 0.5rem; }
    </style>
</head>
<body>
    <h1>📜 Ritual de Verificação (Test Suite)</h1>
    <div id="results">Iniciando rituais de teste...</div>

    <script type="module">
        import { Storage } from './js/storage.js';

        async function runTests() {
            const results = document.getElementById('results');
            results.innerHTML = '';

            const test = async (name, fn) => {
                const div = document.createElement('div');
                div.className = 'test-case';
                try {
                    await fn();
                    div.innerHTML = `[✓] ${name} - <span class="pass">SUCESSO</span>`;
                } catch (e) {
                    div.innerHTML = `[✗] ${name} - <span class="fail">FALHA</span>: ${e.message}`;
                }
                results.appendChild(div);
            };

            // --- TESTE 1: Geração de Chave ---
            await test('Gerador de Player Key', () => {
                const key1 = Storage.generatePlayerKey('teste@email.com');
                const key2 = Storage.generatePlayerKey('teste@email.com');
                if (key1 !== key2) throw new Error('Chaves divergentes para o mesmo ID');
                if (!key1) throw new Error('Chave vazia gerada');
            });

            // --- TESTE 2: Web Crypto (Criptografia) ---
            await test('Criptografia AES-GCM (Security)', async () => {
                const key = 'CHAVE_TESTE_123';
                await Storage.init(key);
                const testData = { secret: 'Mapa do Tesouro' };
                const encrypted = await Storage.encrypt(testData);
                const decrypted = await Storage.decrypt(encrypted);
                if (decrypted.secret !== testData.secret) throw new Error('Dados corrompidos na descriptografia');
            });

            // --- TESTE 3: Sistema de Perfis ---
            await test('Gestão de Perfis Múltiplos', async () => {
                await Storage.createUser('key123', 'Mestre');
                const profile = Storage.getActiveProfile('key123');
                if (profile.name !== 'Aventureiro Padrão') throw new Error('Perfil padrão não criado');
                if (!Array.isArray(profile.characters)) throw new Error('Lista de personagens ausente no perfil');
            });

            // --- TESTE 4: Regras SRD ---
            await test('Cálculo de Modificadores (Regras 5e)', () => {
                const calcMod = (score) => Math.floor((score - 10) / 2);
                if (calcMod(20) !== 5) throw new Error('Modificador de 20 deve ser +5');
                if (calcMod(10) !== 0) throw new Error('Modificador de 10 deve ser 0');
                if (calcMod(8) !== -1) throw new Error('Modificador de 8 deve ser -1');
            });

            const footer = document.createElement('h2');
            footer.innerHTML = '<br>✨ Rituais Concluídos.';
            results.appendChild(footer);
        }

        runTests();
    </script>
</body>
</html>
